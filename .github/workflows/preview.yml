name: Preview Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: make lint
      - run: make test
      - name: Compute preview version
        id: version
        run: |
          # Find latest stable release (exclude prereleases)
          latest_tag=$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --exclude '*-*' --abbrev=0 2>/dev/null || echo "v0.0.0")
          commit_count=$(git rev-list "${latest_tag}..HEAD" --count)
          if [ "$commit_count" = "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base=${latest_tag#v}
          IFS='.' read -r major minor patch <<< "$base"
          next_patch=$((patch + 1))
          # Increment from highest existing preview tag instead of using commit count
          preview_num=0
          for tag in $(git tag -l "v${major}.${minor}.${next_patch}-preview.*"); do
            num=${tag##*preview.}
            if [ "$num" -gt "$preview_num" ] 2>/dev/null; then
              preview_num=$num
            fi
          done
          preview_num=$((preview_num + 1))
          version="v${major}.${minor}.${next_patch}-preview.${preview_num}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
      - name: Build release binaries
        if: steps.version.outputs.skip != 'true'
        run: make release VERSION=${{ steps.version.outputs.version }}
      - name: Create GitHub Pre-release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: dist/*
